<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Government Scheme Eligibility Finder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div id="page-loader"><div class="loader-spinner"></div></div>
    <nav class="navbar navbar-expand-lg navbar-govt">
        <div class="container">
            <a class="navbar-brand" href="index.html"><svg width="36" height="36" viewBox="0 0 36 36" fill="none"><circle cx="18" cy="18" r="18" fill="#1a56db"/><path d="M18 8l2 6h6l-5 4 2 6-5-4-5 4 2-6-5-4h6z" fill="#fff"/></svg> Govt Scheme Finder</a>
            <div class="ms-auto d-flex align-items-center gap-2">
                <button class="theme-toggle" id="themeToggle"><i class="bi bi-moon-fill"></i></button>
                <a href="register.html" class="btn btn-sm btn-govt-primary">Register</a>
            </div>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <h2><i class="bi bi-box-arrow-in-right text-primary"></i> Login</h2>
            <p class="auth-subtitle">Sign in to access your dashboard and check eligibility</p>
            <form id="loginForm" class="form-govt">
                <div class="mb-3">
                    <label class="form-label">Email Address *</label>
                    <input type="email" name="email" class="form-control" placeholder="your@email.com" required>
                    <div class="invalid-feedback">Email is required</div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password *</label>
                    <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                    <div class="invalid-feedback">Password is required</div>
                </div>
                <div class="mb-4 text-end">
                    <a href="#" data-bs-toggle="modal" data-bs-target="#forgotModal">Forgot Password?</a>
                </div>
                <button type="submit" class="btn btn-govt-primary w-100 mb-3">Login</button>
                <p class="text-center mb-0">Don't have an account? <a href="register.html">Register here</a></p>
            </form>
        </div>
    </div>

    <!-- Forgot Password Modal -->
    <div class="modal fade" id="forgotModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header"><h5 class="modal-title">Forgot Password</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <form id="forgotPasswordForm" class="form-govt">
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" name="email" class="form-control" placeholder="Enter registered email" required>
                        </div>
                        <button type="submit" class="btn btn-govt-primary w-100">Send Reset Link</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
