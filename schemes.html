<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Government Schemes - Eligibility Finder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body id="schemesPage">
    <div id="page-loader"><div class="loader-spinner"></div></div>
    <nav class="navbar navbar-expand-lg navbar-govt">
        <div class="container">
            <a class="navbar-brand" href="index.html"><svg width="36" height="36" viewBox="0 0 36 36" fill="none"><circle cx="18" cy="18" r="18" fill="#1a56db"/><path d="M18 8l2 6h6l-5 4 2 6-5-4-5 4 2-6-5-4h6z" fill="#fff"/></svg> Govt Scheme Finder</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-lg-center gap-1">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="eligibility.html">Eligibility Checker</a></li>
                    <li class="nav-item"><a class="nav-link active" href="schemes.html">Schemes</a></li>
                    <li class="nav-item"><a class="nav-link" href="documents.html">Documents</a></li>
                    <li class="nav-item"><a class="nav-link" href="guidance.html">Guidance</a></li>
                    <li class="nav-item"><a class="nav-link" href="notifications.html">Notifications</a></li>
                    <li class="nav-item ms-lg-2"><button class="theme-toggle" id="themeToggle"><i class="bi bi-moon-fill"></i></button></li>
                    <li class="nav-item ms-lg-2" id="loginNavBtn"><a class="nav-link btn-login-nav" href="login.html">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <nav aria-label="breadcrumb"><ol class="breadcrumb breadcrumb-govt"><li class="breadcrumb-item"><a href="index.html">Home</a></li><li class="breadcrumb-item active">Schemes</li></ol></nav>

        <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
            <div><h2 class="section-title mb-0">Government Schemes</h2><p class="text-muted mb-0">Browse all available schemes from official sources</p></div>
            <div class="d-flex gap-2">
                <input type="text" id="schemeSearch" class="form-control" placeholder="Search schemes..." style="min-width:250px">
                <select id="sortSelect" class="form-select" style="width:auto">
                    <option value="latest">Latest</option>
                    <option value="alphabetical">Alphabetical</option>
                </select>
            </div>
        </div>

        <!-- Category Filters -->
        <div class="d-flex flex-wrap gap-2 mb-4">
            <button class="btn btn-sm btn-primary active" data-category="all">All</button>
            <button class="btn btn-sm btn-outline-primary" data-category="Student">Student</button>
            <button class="btn btn-sm btn-outline-primary" data-category="Farmer">Farmer</button>
            <button class="btn btn-sm btn-outline-primary" data-category="Women">Women</button>
            <button class="btn btn-sm btn-outline-primary" data-category="Senior Citizen">Senior Citizen</button>
            <button class="btn btn-sm btn-outline-primary" data-category="Business">Business</button>
            <button class="btn btn-sm btn-outline-primary" data-category="Education">Education</button>
            <button class="btn btn-sm btn-outline-primary" data-category="Health">Health</button>
            <button class="btn btn-sm btn-outline-primary" data-category="Employment">Employment</button>
            <button class="btn btn-sm btn-outline-primary" data-category="Housing">Housing</button>
        </div>

        <div class="row">
            <!-- Advanced Filters -->
            <div class="col-lg-3 mb-4">
                <div class="filter-sidebar">
                    <h6><i class="bi bi-funnel"></i> Advanced Filters</h6>
                    <form id="filterForm">
                        <div class="mb-2"><label class="form-label small">Min Age</label><input type="number" id="filterMinAge" class="form-control form-control-sm"></div>
                        <div class="mb-2"><label class="form-label small">Max Age</label><input type="number" id="filterMaxAge" class="form-control form-control-sm"></div>
                        <div class="mb-2"><label class="form-label small">Gender</label><select id="filterGender" class="form-select form-select-sm"><option value="">Any</option><option value="Male">Male</option><option value="Female">Female</option></select></div>
                        <div class="mb-2"><label class="form-label small">Max Income</label><input type="number" id="filterIncome" class="form-control form-control-sm" placeholder="Annual income"></div>
                        <div class="mb-2"><label class="form-label small">Occupation</label><input type="text" id="filterOccupation" class="form-control form-control-sm"></div>
                        <div class="mb-2"><label class="form-label small">Education</label><input type="text" id="filterEducation" class="form-control form-control-sm"></div>
                        <div class="mb-2"><label class="form-label small">State</label><select id="filterState" class="form-select form-select-sm"><option value="">Any</option></select></div>
                        <div class="mb-2"><label class="form-label small">Category</label><select id="filterCategory" class="form-select form-select-sm"><option value="">Any</option><option value="SC">SC</option><option value="ST">ST</option><option value="OBC">OBC</option><option value="EWS">EWS</option></select></div>
                        <div class="mb-2"><label class="form-label small">Disability</label><select id="filterDisability" class="form-select form-select-sm"><option value="">Any</option><option value="Yes">Yes</option></select></div>
                        <div class="mb-2"><label class="form-label small">Farmer</label><select id="filterFarmer" class="form-select form-select-sm"><option value="">Any</option><option value="Yes">Yes</option></select></div>
                        <div class="mb-3"><label class="form-label small">Student</label><select id="filterStudent" class="form-select form-select-sm"><option value="">Any</option><option value="Yes">Yes</option></select></div>
                        <button type="button" id="applyFilters" class="btn btn-govt-primary btn-sm w-100 mb-2">Apply Filters</button>
                        <button type="button" id="clearFilters" class="btn btn-outline-secondary btn-sm w-100">Clear</button>
                    </form>
                </div>
            </div>

            <!-- Schemes Grid -->
            <div class="col-lg-9">
                <div class="row" id="schemesGrid"><div class="col-12 text-center py-5"><div class="loader-spinner mx-auto"></div></div></div>
                <div id="paginationContainer" class="mt-4"></div>
            </div>
        </div>
    </div>

    <footer class="footer-govt"><div class="container"><div class="footer-bottom"><p>&copy; 2024 Government Scheme Eligibility Finder</p></div></div></footer>
    <button id="scrollTopBtn"><i class="bi bi-arrow-up"></i></button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/schemes.js"></script>
</body>
</html>
