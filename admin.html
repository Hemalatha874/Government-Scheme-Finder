<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal - Government Scheme Eligibility Finder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <style>
        .admin-sidebar {
            background: #111827;
            min-height: calc(100vh - var(--navbar-height));
            color: #d1d5db;
        }
        .admin-sidebar .nav-link {
            color: #9ca3af;
            padding: 12px 20px;
            border-radius: 8px;
            margin: 4px 10px;
            transition: var(--transition);
        }
        .admin-sidebar .nav-link:hover,
        .admin-sidebar .nav-link.active {
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
        }
        .admin-stat-card {
            background: var(--bg-white);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow-sm);
            border-left: 4px solid var(--primary-blue);
            transition: var(--transition);
            border-top: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }
        .admin-stat-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }
    </style>
</head>
<body id="adminPage">
    <div id="page-loader"><div class="loader-spinner"></div></div>
    
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-govt">
        <div class="container-fluid px-lg-4">
            <a class="navbar-brand" href="index.html">
                <svg width="36" height="36" viewBox="0 0 36 36" fill="none"><circle cx="18" cy="18" r="18" fill="#1a56db"/><path d="M18 8l2 6h6l-5 4 2 6-5-4-5 4 2-6-5-4h6z" fill="#fff"/><circle cx="18" cy="18" r="14" stroke="#057a55" stroke-width="1.5" fill="none"/></svg>
                Govt Scheme Finder <span class="badge bg-danger ms-2 small" style="font-size:0.68rem; vertical-align:middle;">ADMIN</span>
            </a>
            <div class="ms-auto d-flex align-items-center gap-2">
                <button class="theme-toggle" id="themeToggle"><i class="bi bi-moon-fill"></i></button>
                <a href="index.html" class="btn btn-sm btn-outline-primary"><i class="bi bi-house"></i> Home</a>
            </div>
        </div>
    </nav>

    <!-- Admin Login Section -->
    <div id="adminLoginSection" style="display:none">
        <div class="auth-container">
            <div class="auth-card">
                <div class="text-center mb-4">
                    <svg width="60" height="60" viewBox="0 0 36 36" fill="none"><circle cx="18" cy="18" r="18" fill="#ef4444"/><path d="M18 8l2 6h6l-5 4 2 6-5-4-5 4 2-6-5-4h6z" fill="#fff"/></svg>
                    <h3 class="mt-3">Administrator Portal</h3>
                    <p class="text-muted small">Sign in with system administrator credentials</p>
                </div>
                <form id="adminLoginForm" class="form-govt">
                    <div class="mb-3">
                        <label class="form-label">Username or Email *</label>
                        <input type="text" name="username" class="form-control" placeholder="admin" required autocomplete="username">
                        <div class="invalid-feedback">Username is required</div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Password *</label>
                        <input type="password" name="password" class="form-control" placeholder="Enter admin password" required autocomplete="current-password">
                        <div class="invalid-feedback">Password is required</div>
                    </div>
                    <button type="submit" class="btn btn-danger w-100 mb-2">
                        <i class="bi bi-shield-lock"></i> Secure Login
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Admin Panel Section -->
    <div id="adminPanelSection" style="display:none">
        <div class="container-fluid">
            <div class="row">
                <!-- Sidebar -->
                <div class="col-md-3 col-lg-2 p-0 admin-sidebar">
                    <div class="d-flex flex-column pt-3">
                        <a class="nav-link active" href="#" data-admin-tab="dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a>
                        <a class="nav-link" href="#" data-admin-tab="schemes"><i class="bi bi-grid"></i> Manage Schemes</a>
                        <a class="nav-link" href="#" data-admin-tab="add_scheme"><i class="bi-plus-circle"></i> Add Scheme</a>
                        <a class="nav-link" href="#" data-admin-tab="users"><i class="bi bi-people"></i> Manage Users</a>
                        <a class="nav-link" href="#" data-admin-tab="notifications"><i class="bi bi-bell"></i> Notifications</a>
                        <a class="nav-link" href="#" data-admin-tab="documents"><i class="bi bi-file-earmark-arrow-up"></i> Documents</a>
                        <a class="nav-link" href="#" data-admin-tab="applications"><i class="bi bi-file-earmark-check"></i> Applications</a>
                        <a class="nav-link" href="#" data-admin-tab="messages"><i class="bi bi-envelope"></i> Messages</a>
                        <hr class="mx-3 bg-secondary">
                        <a class="nav-link text-danger fw-semibold" href="#" onclick="adminLogout()"><i class="bi bi-box-arrow-right"></i> Logout</a>
                    </div>
                </div>

                <!-- Main Content Area -->
                <div class="col-md-9 col-lg-10 p-4">
                    <div id="adminContent">
                        <div class="text-center py-5">
                            <div class="loader-spinner mx-auto"></div>
                            <p class="mt-2 text-muted">Loading administrative modules...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <button id="scrollTopBtn"><i class="bi bi-arrow-up"></i></button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
