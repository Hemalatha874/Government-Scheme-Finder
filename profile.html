<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Government Scheme Eligibility Finder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div id="page-loader"><div class="loader-spinner"></div></div>
    <nav class="navbar navbar-expand-lg navbar-govt">
        <div class="container">
            <a class="navbar-brand" href="index.html"><svg width="36" height="36" viewBox="0 0 36 36" fill="none"><circle cx="18" cy="18" r="18" fill="#1a56db"/><path d="M18 8l2 6h6l-5 4 2 6-5-4-5 4 2-6-5-4h6z" fill="#fff"/></svg> Govt Scheme Finder</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-lg-center gap-1">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link active" href="profile.html">Profile</a></li>
                    <li class="nav-item ms-lg-2"><button class="theme-toggle" id="themeToggle"><i class="bi bi-moon-fill"></i></button></li>
                    <li class="nav-item ms-lg-2"><a class="nav-link" href="#" onclick="logout()">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <nav aria-label="breadcrumb"><ol class="breadcrumb breadcrumb-govt"><li class="breadcrumb-item"><a href="index.html">Home</a></li><li class="breadcrumb-item"><a href="dashboard.html">Dashboard</a></li><li class="breadcrumb-item active">Profile</li></ol></nav>

        <h2 class="section-title">My Profile</h2>
        <p class="section-subtitle">Complete your profile for accurate eligibility matching</p>

        <form id="profileForm" class="form-govt govt-card">
            <div class="row g-3">
                <div class="col-md-6"><label class="form-label">Full Name *</label><input type="text" name="full_name" id="full_name" class="form-control" required></div>
                <div class="col-md-3"><label class="form-label">Age *</label><input type="number" name="age" id="age" class="form-control" min="1" max="120" required></div>
                <div class="col-md-3"><label class="form-label">Gender</label>
                    <select name="gender" id="gender" class="form-select"><option value="Any">Select</option><option value="Male">Male</option><option value="Female">Female</option><option value="Other">Other</option></select>
                </div>
                <div class="col-md-4"><label class="form-label">Date of Birth</label><input type="date" name="date_of_birth" id="date_of_birth" class="form-control"></div>
                <div class="col-md-4"><label class="form-label">State *</label><select name="state" id="state" class="form-select" required><option value="">Select State</option></select></div>
                <div class="col-md-4"><label class="form-label">District</label><input type="text" name="district" id="district" class="form-control" placeholder="Enter district"></div>
                <div class="col-md-4"><label class="form-label">Occupation</label>
                    <select name="occupation" id="occupation" class="form-select">
                        <option value="">Select</option><option value="Farmer">Farmer</option><option value="Student">Student</option>
                        <option value="Self Employed">Self Employed</option><option value="Business">Business</option>
                        <option value="Government Employee">Government Employee</option><option value="Private Employee">Private Employee</option>
                        <option value="Unorganized Worker">Unorganized Worker</option><option value="Homemaker">Homemaker</option><option value="Retired">Retired</option><option value="Other">Other</option>
                    </select>
                </div>
                <div class="col-md-4"><label class="form-label">Education</label>
                    <select name="education" id="education" class="form-select">
                        <option value="">Select</option><option value="Illiterate">Illiterate</option><option value="Primary">Primary</option>
                        <option value="Class 8 Pass">Class 8 Pass</option><option value="Class 10 Pass">Class 10 Pass</option>
                        <option value="Class 12 Pass">Class 12 Pass</option><option value="Graduate">Graduate</option>
                        <option value="Post Graduate">Post Graduate</option><option value="Post-Matric">Post-Matric</option>
                    </select>
                </div>
                <div class="col-md-4"><label class="form-label">Annual Income (Rs.)</label><input type="number" name="annual_income" id="annual_income" class="form-control" min="0" placeholder="Annual family income"></div>
                <div class="col-md-3"><label class="form-label">Category</label>
                    <select name="category" id="category" class="form-select"><option value="Any">General</option><option value="OBC">OBC</option><option value="SC">SC</option><option value="ST">ST</option><option value="EWS">EWS</option></select>
                </div>
                <div class="col-md-3"><label class="form-label">Disability Status</label>
                    <select name="disability_status" id="disability_status" class="form-select"><option value="No">No</option><option value="Yes">Yes</option></select>
                </div>
                <div class="col-md-3"><label class="form-label">Farmer</label>
                    <select name="is_farmer" id="is_farmer" class="form-select"><option value="No">No</option><option value="Yes">Yes</option></select>
                </div>
                <div class="col-md-3"><label class="form-label">Student</label>
                    <select name="is_student" id="is_student" class="form-select"><option value="No">No</option><option value="Yes">Yes</option></select>
                </div>
                <div class="col-12 d-flex gap-2 mt-3">
                    <button type="submit" class="btn btn-govt-primary"><i class="bi bi-save"></i> Save Profile</button>
                    <button type="button" class="btn btn-govt-secondary" id="updateBtn"><i class="bi bi-pencil"></i> Update</button>
                    <button type="reset" class="btn btn-outline-secondary"><i class="bi bi-arrow-counterclockwise"></i> Reset</button>
                </div>
            </div>
        </form>
    </div>

    <footer class="footer-govt"><div class="container"><div class="footer-bottom"><p>&copy; 2024 Government Scheme Eligibility Finder</p></div></div></footer>
    <button id="scrollTopBtn"><i class="bi bi-arrow-up"></i></button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await requireAuth();
            populateStates('state');
            await loadProfile();

            document.getElementById('profileForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                if (!validateForm(e.target)) { showToast('Please fill required fields', 'warning'); return; }
                const formData = Object.fromEntries(new FormData(e.target));
                const data = await apiCall('profile.php?action=save', { method: 'POST', body: JSON.stringify(formData) });
                if (data.success) showToast(data.message, 'success');
            });

            document.getElementById('updateBtn').addEventListener('click', () => {
                document.getElementById('profileForm').dispatchEvent(new Event('submit'));
            });
        });

        async function loadProfile() {
            const data = await apiCall('profile.php?action=get');
            if (data.success && data.profile) {
                const p = data.profile;
                Object.keys(p).forEach(key => {
                    const el = document.getElementById(key);
                    if (el && p[key] !== null) el.value = p[key];
                });
            }
        }
    </script>
</body>
</html>
