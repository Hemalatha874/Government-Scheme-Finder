<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Government Scheme Eligibility Finder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div id="page-loader"><div class="loader-spinner"></div></div>
    <nav class="navbar navbar-expand-lg navbar-govt">
        <div class="container">
            <a class="navbar-brand" href="index.html"><svg width="36" height="36" viewBox="0 0 36 36" fill="none"><circle cx="18" cy="18" r="18" fill="#1a56db"/><path d="M18 8l2 6h6l-5 4 2 6-5-4-5 4 2-6-5-4h6z" fill="#fff"/></svg> Govt Scheme Finder</a>
            <div class="ms-auto d-flex align-items-center gap-2">
                <button class="theme-toggle" id="themeToggle"><i class="bi bi-moon-fill"></i></button>
                <a href="login.html" class="btn btn-sm btn-outline-primary">Login</a>
            </div>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <h2><i class="bi bi-person-plus text-primary"></i> Create Account</h2>
            <p class="auth-subtitle">Register to check your eligibility for government schemes</p>
            <form id="registerForm" class="form-govt">
                <div class="mb-3">
                    <label class="form-label">Full Name *</label>
                    <input type="text" name="full_name" class="form-control" placeholder="Enter your full name" required>
                    <div class="invalid-feedback">Full name is required</div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email Address *</label>
                    <input type="email" name="email" class="form-control" placeholder="your@email.com" required>
                    <div class="invalid-feedback">Valid email is required</div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Mobile Number *</label>
                    <input type="tel" name="mobile" class="form-control" placeholder="10-digit mobile number" pattern="[6-9][0-9]{9}" required>
                    <div class="invalid-feedback">Valid 10-digit mobile number required</div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password *</label>
                    <input type="password" name="password" class="form-control" placeholder="Minimum 6 characters" minlength="6" required>
                    <div class="invalid-feedback">Password must be at least 6 characters</div>
                </div>
                <div class="mb-4">
                    <label class="form-label">Confirm Password *</label>
                    <input type="password" name="confirm_password" class="form-control" placeholder="Re-enter password" required>
                    <div class="invalid-feedback">Please confirm your password</div>
                </div>
                <button type="submit" class="btn btn-govt-primary w-100 mb-3">Register</button>
                <p class="text-center mb-0">Already have an account? <a href="login.html">Login here</a></p>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
